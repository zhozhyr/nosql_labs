info:
  name: review_create
  type: http
  seq: 9

http:
  method: POST
  url: "{{base_url}}/events/{{event_id}}/reviews"
  auth: inherit
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "comment": "Bruno smoke review",
        "rating": 5
      }

runtime:
  variables:
    - name: base_url
      value: http://localhost:8080
  assertions:
    - expression: res.status
      operator: eq
      value: "201"
    - expression: typeof res.body.id === "string"
      operator: eq
      value: "true"

script:
  post-response: |
    bru.setVar("review_id", res.body.id);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
