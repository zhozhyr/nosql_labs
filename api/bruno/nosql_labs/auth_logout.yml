info:
  name: auth_logout
  type: http
  seq: 13

http:
  method: POST
  url: "{{base_url}}/auth/logout"
  auth: inherit
  body:
    mode: none

runtime:
  variables:
    - name: base_url
      value: http://localhost:8080
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
    - expression: res.headers["set-cookie"][0].includes("X-Session-Id=")
      operator: eq
      value: "true"
    - expression: res.headers["set-cookie"][0].includes("Max-Age=0")
      operator: eq
      value: "true"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
