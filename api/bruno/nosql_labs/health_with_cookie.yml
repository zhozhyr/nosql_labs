info:
  name: health_with_cookie
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/health"
  auth: inherit

runtime:
  variables:
    - name: base_url
      value: http://localhost:8080
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.status
      operator: eq
      value: '"ok"'
    - expression: res.headers["set-cookie"][0].includes("X-Session-Id=")
      operator: eq
      value: "true"
    - expression: res.headers["set-cookie"][0].includes("HttpOnly")
      operator: eq
      value: "true"
    - expression: res.headers["set-cookie"][0].includes("Path=/")
      operator: eq
      value: "true"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
