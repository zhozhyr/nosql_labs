info:
  name: recommendations_list
  type: http
  seq: 12

http:
  method: GET
  url: "{{base_url}}/recommendations"
  auth: inherit

runtime:
  variables:
    - name: base_url
      value: http://localhost:8080
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: Array.isArray(res.body.events)
      operator: eq
      value: "true"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
