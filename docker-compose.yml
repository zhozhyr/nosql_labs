services:
  service:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.local
    ports:
      - "${APP_PORT}:${APP_PORT}"
    depends_on:
      redis:
        condition: service_started
      cassandra-test:
        condition: service_healthy
      cassandra-init:
        condition: service_completed_successfully
      mongos:
        condition: service_started
      mongo-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    env_file:
      - .env.local
    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"
    command:
      - sh
      - -c
      - |
        if [ -n "$${REDIS_PASSWORD}" ]; then
          exec redis-server --port "$${REDIS_PORT}" --requirepass "$${REDIS_PASSWORD}"
        else
          exec redis-server --port "$${REDIS_PORT}"
        fi
    restart: unless-stopped

  cassandra-test:
    image: cassandra:4.1
    env_file:
      - .env.local
    hostname: ${CASSANDRA_HOSTS}
    ports:
      - "${CASSANDRA_PORT}:${CASSANDRA_PORT}"
    environment:
      CASSANDRA_CLUSTER_NAME: ndbx-lab
      CASSANDRA_NATIVE_TRANSPORT_PORT: ${CASSANDRA_PORT}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cqlsh -e 'describe keyspaces' ${CASSANDRA_HOSTS} ${CASSANDRA_PORT} || exit 1",
        ]
      start_period: ${CASSANDRA_HEALTHCHECK_START_PERIOD}
    restart: unless-stopped

  cassandra-init:
    image: cassandra:4.1
    env_file:
      - .env.local
    depends_on:
      cassandra-test:
        condition: service_healthy
    command:
      - bash
      - -c
      - |
        set -e

        cqlsh "${CASSANDRA_HOSTS}" "${CASSANDRA_PORT}" -e "CREATE KEYSPACE IF NOT EXISTS ${CASSANDRA_KEYSPACE} WITH replication = {'class': 'SimpleStrategy', 'replication_factor': 1};"
        cqlsh "${CASSANDRA_HOSTS}" "${CASSANDRA_PORT}" -e "CREATE TABLE IF NOT EXISTS ${CASSANDRA_KEYSPACE}.event_reactions (event_id text, created_by text, like_value tinyint, created_at timestamp, PRIMARY KEY ((event_id), created_by));"
        cqlsh "${CASSANDRA_HOSTS}" "${CASSANDRA_PORT}" -e "CREATE INDEX IF NOT EXISTS event_reactions_like_value_idx ON ${CASSANDRA_KEYSPACE}.event_reactions (like_value);"
        cqlsh "${CASSANDRA_HOSTS}" "${CASSANDRA_PORT}" -e "CREATE INDEX IF NOT EXISTS event_reactions_created_by_idx ON ${CASSANDRA_KEYSPACE}.event_reactions (created_by);"
    restart: "no"

  configsvr1:
    image: ${MONGO_IMAGE}
    env_file:
      - .env.local
    command:
      [
        "mongod",
        "--configsvr",
        "--replSet", "${CONFIG_REPLSET}",
        "--port", "${CONFIGSVR_PORT}",
        "--bind_ip_all"
      ]
    ports:
      - "${CONFIGSVR_PORT}:${CONFIGSVR_PORT}"
    volumes:
      - configsvr1-data:/data/db
    restart: unless-stopped

  shard1-primary:
    image: ${MONGO_IMAGE}
    env_file:
      - .env.local
    command:
      [
        "mongod",
        "--shardsvr",
        "--replSet", "${SHARD1_REPLSET}",
        "--port", "${SHARD1_PRIMARY_PORT}",
        "--bind_ip_all"
      ]
    ports:
      - "${SHARD1_PRIMARY_PORT}:${SHARD1_PRIMARY_PORT}"
    volumes:
      - shard1-primary-data:/data/db
    restart: unless-stopped

  shard1-secondary-1:
    image: ${MONGO_IMAGE}
    env_file:
      - .env.local
    command:
      [
        "mongod",
        "--shardsvr",
        "--replSet", "${SHARD1_REPLSET}",
        "--port", "${SHARD1_SECONDARY_1_PORT}",
        "--bind_ip_all"
      ]
    ports:
      - "${SHARD1_SECONDARY_1_PORT}:${SHARD1_SECONDARY_1_PORT}"
    volumes:
      - shard1-secondary-1-data:/data/db
    restart: unless-stopped

  shard1-secondary-2:
    image: ${MONGO_IMAGE}
    env_file:
      - .env.local
    command:
      [
        "mongod",
        "--shardsvr",
        "--replSet", "${SHARD1_REPLSET}",
        "--port", "${SHARD1_SECONDARY_2_PORT}",
        "--bind_ip_all"
      ]
    ports:
      - "${SHARD1_SECONDARY_2_PORT}:${SHARD1_SECONDARY_2_PORT}"
    volumes:
      - shard1-secondary-2-data:/data/db
    restart: unless-stopped

  shard2-primary:
    image: ${MONGO_IMAGE}
    env_file:
      - .env.local
    command:
      [
        "mongod",
        "--shardsvr",
        "--replSet", "${SHARD2_REPLSET}",
        "--port", "${SHARD2_PRIMARY_PORT}",
        "--bind_ip_all"
      ]
    ports:
      - "${SHARD2_PRIMARY_PORT}:${SHARD2_PRIMARY_PORT}"
    volumes:
      - shard2-primary-data:/data/db
    restart: unless-stopped

  shard2-secondary-1:
    image: ${MONGO_IMAGE}
    env_file:
      - .env.local
    command:
      [
        "mongod",
        "--shardsvr",
        "--replSet", "${SHARD2_REPLSET}",
        "--port", "${SHARD2_SECONDARY_1_PORT}",
        "--bind_ip_all"
      ]
    ports:
      - "${SHARD2_SECONDARY_1_PORT}:${SHARD2_SECONDARY_1_PORT}"
    volumes:
      - shard2-secondary-1-data:/data/db
    restart: unless-stopped

  shard2-secondary-2:
    image: ${MONGO_IMAGE}
    env_file:
      - .env.local
    command:
      [
        "mongod",
        "--shardsvr",
        "--replSet", "${SHARD2_REPLSET}",
        "--port", "${SHARD2_SECONDARY_2_PORT}",
        "--bind_ip_all"
      ]
    ports:
      - "${SHARD2_SECONDARY_2_PORT}:${SHARD2_SECONDARY_2_PORT}"
    volumes:
      - shard2-secondary-2-data:/data/db
    restart: unless-stopped

  mongos:
    image: ${MONGO_IMAGE}
    env_file:
      - .env.local
    command:
      [
        "mongos",
        "--configdb", "${CONFIG_REPLSET}/${CONFIGSVR_HOST}:${CONFIGSVR_PORT}",
        "--port", "${MONGODB_PORT}",
        "--bind_ip_all"
      ]
    ports:
      - "${MONGODB_PORT}:${MONGODB_PORT}"
    depends_on:
      - configsvr1
      - shard1-primary
      - shard1-secondary-1
      - shard1-secondary-2
      - shard2-primary
      - shard2-secondary-1
      - shard2-secondary-2
    restart: unless-stopped

  mongo-init:
    image: ${MONGO_IMAGE}
    env_file:
      - .env.local
    depends_on:
      - configsvr1
      - shard1-primary
      - shard1-secondary-1
      - shard1-secondary-2
      - shard2-primary
      - shard2-secondary-1
      - shard2-secondary-2
      - mongos
    volumes:
      - ./scripts/mongo-init.sh:/docker-entrypoint-initdb.d/mongo-init.sh:ro
    command: ["bash", "/docker-entrypoint-initdb.d/mongo-init.sh"]
    restart: "no"

volumes:
  configsvr1-data:
  shard1-primary-data:
  shard1-secondary-1-data:
  shard1-secondary-2-data:
  shard2-primary-data:
  shard2-secondary-1-data:
  shard2-secondary-2-data:
