services:
  service:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.local
    ports:
      - "${APP_PORT}:${APP_PORT}"
    depends_on:
      redis:
        condition: service_started
      mongos:
        condition: service_started
      mongo-init:
        condition: service_completed_successfully
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    env_file:
      - .env.local
    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"
    command:
      - sh
      - -c
      - |
        if [ -n "$${REDIS_PASSWORD}" ]; then
          exec redis-server --port "$${REDIS_PORT}" --requirepass "$${REDIS_PASSWORD}"
        else
          exec redis-server --port "$${REDIS_PORT}"
        fi
    restart: unless-stopped

  configsvr1:
    image: ${MONGO_IMAGE}
    env_file:
      - .env.local
    command:
      [
        "mongod",
        "--configsvr",
        "--replSet", "${CONFIG_REPLSET}",
        "--port", "${CONFIGSVR_PORT}",
        "--bind_ip_all"
      ]
    ports:
      - "${CONFIGSVR_PORT}:${CONFIGSVR_PORT}"
    volumes:
      - configsvr1-data:/data/db
    restart: unless-stopped

  shard1-primary:
    image: ${MONGO_IMAGE}
    env_file:
      - .env.local
    command:
      [
        "mongod",
        "--shardsvr",
        "--replSet", "${SHARD1_REPLSET}",
        "--port", "${SHARD1_PRIMARY_PORT}",
        "--bind_ip_all"
      ]
    ports:
      - "${SHARD1_PRIMARY_PORT}:${SHARD1_PRIMARY_PORT}"
    volumes:
      - shard1-primary-data:/data/db
    restart: unless-stopped

  shard1-secondary-1:
    image: ${MONGO_IMAGE}
    env_file:
      - .env.local
    command:
      [
        "mongod",
        "--shardsvr",
        "--replSet", "${SHARD1_REPLSET}",
        "--port", "${SHARD1_SECONDARY_1_PORT}",
        "--bind_ip_all"
      ]
    ports:
      - "${SHARD1_SECONDARY_1_PORT}:${SHARD1_SECONDARY_1_PORT}"
    volumes:
      - shard1-secondary-1-data:/data/db
    restart: unless-stopped

  shard1-secondary-2:
    image: ${MONGO_IMAGE}
    env_file:
      - .env.local
    command:
      [
        "mongod",
        "--shardsvr",
        "--replSet", "${SHARD1_REPLSET}",
        "--port", "${SHARD1_SECONDARY_2_PORT}",
        "--bind_ip_all"
      ]
    ports:
      - "${SHARD1_SECONDARY_2_PORT}:${SHARD1_SECONDARY_2_PORT}"
    volumes:
      - shard1-secondary-2-data:/data/db
    restart: unless-stopped

  shard2-primary:
    image: ${MONGO_IMAGE}
    env_file:
      - .env.local
    command:
      [
        "mongod",
        "--shardsvr",
        "--replSet", "${SHARD2_REPLSET}",
        "--port", "${SHARD2_PRIMARY_PORT}",
        "--bind_ip_all"
      ]
    ports:
      - "${SHARD2_PRIMARY_PORT}:${SHARD2_PRIMARY_PORT}"
    volumes:
      - shard2-primary-data:/data/db
    restart: unless-stopped

  shard2-secondary-1:
    image: ${MONGO_IMAGE}
    env_file:
      - .env.local
    command:
      [
        "mongod",
        "--shardsvr",
        "--replSet", "${SHARD2_REPLSET}",
        "--port", "${SHARD2_SECONDARY_1_PORT}",
        "--bind_ip_all"
      ]
    ports:
      - "${SHARD2_SECONDARY_1_PORT}:${SHARD2_SECONDARY_1_PORT}"
    volumes:
      - shard2-secondary-1-data:/data/db
    restart: unless-stopped

  shard2-secondary-2:
    image: ${MONGO_IMAGE}
    env_file:
      - .env.local
    command:
      [
        "mongod",
        "--shardsvr",
        "--replSet", "${SHARD2_REPLSET}",
        "--port", "${SHARD2_SECONDARY_2_PORT}",
        "--bind_ip_all"
      ]
    ports:
      - "${SHARD2_SECONDARY_2_PORT}:${SHARD2_SECONDARY_2_PORT}"
    volumes:
      - shard2-secondary-2-data:/data/db
    restart: unless-stopped

  mongos:
    image: ${MONGO_IMAGE}
    env_file:
      - .env.local
    command:
      [
        "mongos",
        "--configdb", "${CONFIG_REPLSET}/${CONFIGSVR_HOST}:${CONFIGSVR_PORT}",
        "--port", "${MONGODB_PORT}",
        "--bind_ip_all"
      ]
    ports:
      - "${MONGODB_PORT}:${MONGODB_PORT}"
    depends_on:
      - configsvr1
      - shard1-primary
      - shard1-secondary-1
      - shard1-secondary-2
      - shard2-primary
      - shard2-secondary-1
      - shard2-secondary-2
    restart: unless-stopped

  mongo-init:
    image: ${MONGO_IMAGE}
    env_file:
      - .env.local
    depends_on:
      - configsvr1
      - shard1-primary
      - shard1-secondary-1
      - shard1-secondary-2
      - shard2-primary
      - shard2-secondary-1
      - shard2-secondary-2
      - mongos
    volumes:
      - ./scripts/mongo-init.sh:/docker-entrypoint-initdb.d/mongo-init.sh:ro
    command: ["bash", "/docker-entrypoint-initdb.d/mongo-init.sh"]
    restart: "no"

volumes:
  configsvr1-data:
  shard1-primary-data:
  shard1-secondary-1-data:
  shard1-secondary-2-data:
  shard2-primary-data:
  shard2-secondary-1-data:
  shard2-secondary-2-data: