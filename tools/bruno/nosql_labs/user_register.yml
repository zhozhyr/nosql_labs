info:
  name: user_register
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url}}/users"
  auth: inherit
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "full_name": "Джон Доу",
        "username": "bruno_user",
        "password": "bruno_password"
      }

runtime:
  variables:
    - name: base_url
      value: http://localhost:8080
  assertions:
    - expression: res.status
      operator: eq
      value: "201"
    - expression: res.headers["set-cookie"][0].includes("X-Session-Id=")
      operator: eq
      value: "true"
    - expression: res.headers["set-cookie"][0].includes("HttpOnly")
      operator: eq
      value: "true"
    - expression: res.headers["set-cookie"][0].includes("Path=/")
      operator: eq
      value: "true"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
