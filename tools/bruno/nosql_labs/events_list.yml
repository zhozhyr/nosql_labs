info:
  name: events_list
  type: http
  seq: 6

http:
  method: GET
  url: "{{base_url}}/events?title=Bruno&limit=10&offset=0"
  auth: inherit

runtime:
  variables:
    - name: base_url
      value: http://localhost:8080
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: Array.isArray(res.body.events)
      operator: eq
      value: "true"
    - expression: res.body.count >= 1
      operator: eq
      value: "true"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
